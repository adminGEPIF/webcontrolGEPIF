<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APP CONTROL GEPIF WEB</title>
  </head>
  <body class="flex flex-col h-screen w-screen overflow-hidden font-sans bg-slate-50 text-slate-900">
    <!-- Header -->
    <header class="h-14 bg-slate-900 text-white flex items-center justify-between px-6 shrink-0 border-b border-slate-700 shadow-lg z-20">
      <div class="flex items-center space-x-3">
        <div class="w-7 h-7 bg-blue-500 rounded flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
        </div>
        <h1 class="text-lg font-bold tracking-tight uppercase">
          APP CONTROL <span class="text-blue-400">GEPIF WEB</span>
        </h1>
      </div>

      <div class="flex items-center space-x-4" id="auth-container">
        <button id="login-btn" class="flex items-center space-x-2 bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-md text-xs font-bold transition-all shadow-md active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
          <span>LOG IN</span>
        </button>
      </div>
    </header>

    <!-- Àrea del Mapa -->
    <main class="flex-1 relative bg-slate-200">
      <div id="viewDiv" class="w-full h-full">
        <!-- Overlay de càrrega -->
        <div id="loader" class="absolute inset-0 flex items-center justify-center bg-slate-100 z-30">
          <div class="flex flex-col items-center">
             <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-blue-500 animate-pulse mb-4"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
             <p class="text-sm font-mono text-slate-400 uppercase tracking-widest">Carregant mapa GEPIF...</p>
          </div>
        </div>
      </div>

      <!-- Widgets Flotants -->
      <div class="absolute bottom-6 left-6 pointer-events-none z-10">
        <div class="bg-white/90 backdrop-blur-md px-3 py-2 rounded-lg border border-slate-300 shadow-xl pointer-events-auto">
          <div class="flex items-center space-x-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
            <span id="status-text" class="text-[10px] font-mono text-slate-600 font-bold uppercase tracking-wider">
              GEPIF STATUS: CONNECTING
            </span>
          </div>
        </div>
      </div>

      <div class="absolute bottom-6 right-6 text-right pointer-events-none z-10">
        <div class="bg-slate-900/80 text-white px-3 py-1.5 rounded-md text-[10px] border border-slate-700 shadow-lg backdrop-blur-sm">
          Portal ID: e3b36112...29fa
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
